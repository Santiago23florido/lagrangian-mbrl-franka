# Dynamics-learning benchmark — offline, simulator-free (runs tonight on CPU).
#
# Compares the recommended structured model (DeLaN) against the unstructured
# PETS-style MLP ensemble on held-out one-step acceleration MSE, with per-model
# hyper-parameter search and a multi-seed bootstrap CI.
#
# Run:  python scripts/run_benchmark.py --config configs/benchmark/dynamics_offline.yaml
# Swap to Isaac Lab data later:  source: "franka:logs/franka_transitions.npz"

source: two_link                 # analytic system: pendulum | two_link
models: [delan, mlp, mlp_ensemble]

# Data regime — small train set highlights the sample-efficiency gap.
n_train: 256
n_val: 2048

# Multi-seed evaluation (>= 5 seeds for credible 95% CIs).
seeds: [0, 1, 2, 3, 4]

# Hyper-parameter search (Optuna if installed, else random search).
hpo_trials: 20
hpo_epochs: 150                  # short while searching
train_epochs: 600                # full epochs for the final per-seed retrain

dtype: float64                   # conditions the DeLaN mass-matrix solves
n_bootstrap: 10000
out_dir: logs/benchmarks
