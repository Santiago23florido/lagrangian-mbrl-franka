# Model-based RL experiment. Override `model=mlp` for the unstructured baseline.
name: dln_mbrl

mbrl:
  total_env_steps: 1000000
  warmup_random_steps: 5000
  model_train_freq: 1000
  model_train_epochs: 50
  planner: mppi              # mppi | cem | dyna_sac
  planning_horizon: 15
  num_eval_episodes: 10
  eval_freq: 10000
