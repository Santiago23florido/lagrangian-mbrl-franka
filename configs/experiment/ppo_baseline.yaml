# Model-free PPO baseline via RSL-RL / SKRL (Isaac Lab default trainer).
name: ppo_baseline

rl:
  algorithm: ppo            # ppo (RSL-RL) | sac (SKRL)
  library: rsl_rl           # rsl_rl | skrl
  total_env_steps: 50000000 # model-free needs far more samples than MBRL
  num_steps_per_env: 24
  num_learning_epochs: 5
  gamma: 0.99
  lam: 0.95
  learning_rate: 3.0e-4
  num_eval_episodes: 10
  eval_freq: 100000
