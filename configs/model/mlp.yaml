# Unstructured MLP-ensemble dynamics model (the baseline / control).
name: mlp
_target_: lagrangian_mbrl.models.MLPDynamicsEnsemble

config:
  size: 5
  member:
    state_dim: 14            # (q, q̇) for 7-DoF Franka
    action_dim: 7
    hidden_sizes: [256, 256, 256]
    activation: silu
    probabilistic: true       # PETS-style mean + log-variance
    ensemble_size: 5
