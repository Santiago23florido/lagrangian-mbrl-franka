# Root Hydra config. Compose with overrides, e.g.:
#   python scripts/train.py experiment=dln_mbrl model=mlp seed=3
defaults:
  - env: franka_reach
  - model: dln
  - experiment: dln_mbrl
  - _self_

seed: 0
device: cuda
project_name: lagrangian-mbrl-franka

# Logging
logging:
  wandb: true
  tensorboard: true
  log_dir: logs

# Hydra run/output directory layout
hydra:
  run:
    dir: logs/${project_name}/${experiment.name}/seed_${seed}/${now:%Y-%m-%d_%H-%M-%S}
